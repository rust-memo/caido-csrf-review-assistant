name: Bug report
description: Report a reproducible problem without sensitive traffic.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include real credentials, customer traffic, or private target information.
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: 1.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Caido version and platform
      placeholder: Caido version, operating system
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain expected and actual behavior using synthetic data.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. Open ...\n2. Select ...\n3. Observe ..."
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized logs or screenshots
      description: Remove cookies, tokens, URLs, account data, and customer information.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed all credentials and private target data.
          required: true
