name: Feature request
description: Suggest a focused improvement to the passive review workflow.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What review workflow or limitation should be improved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Proposed outcome
      description: Describe desired behavior and passive-safety constraints.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
